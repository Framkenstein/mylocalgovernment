[build]
  publish = "."
  command = "echo 'No build step required'"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/scorecard"
  to = "/scorecard.html"
  status = 200

[[redirects]]
  from = "/budget"
  to = "/budget.html"
  status = 200

[[redirects]]
  from = "/santa-cruz-city/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/santa-cruz-city"
  to = "/scorecard"
  status = 200
